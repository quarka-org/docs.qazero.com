              rows: "数千〜数万件"
              exact: "page_idで逆引き。高速"
              in: "高速"
              note: "求人ページフラグ(0/1)。Generated Column"
          - material_column: "is_video"
            physical_column: "is_video"
            resolve_via: "page_id"
